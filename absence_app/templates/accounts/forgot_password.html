<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié | GestiAbsence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #fff; border-radius: 20px; box-shadow: 0 4px 40px rgba(0,0,0,.08); padding: 48px; max-width: 440px; width: 100%; }
        .form-control { border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 10px 14px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-control:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .btn-send { background: linear-gradient(135deg, #4F46E5, #6366F1); color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 700; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <div class="text-center mb-4">
        <div style="width:56px;height:56px;background:#EEF2FF;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.5rem;color:#4F46E5;">
            <i class="bi bi-lock-fill"></i>
        </div>
        <h4 style="font-weight:800;color:#0F172A;">Mot de passe oublié ?</h4>
        <p style="color:#64748B;font-size:.875rem;">Entrez votre email pour recevoir un lien de réinitialisation.</p>
    </div>

    {% if messages %}{% for message in messages %}<div class="alert alert-{{ message.tags }} mb-3">{{ message }}</div>{% endfor %}{% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label" style="font-size:.8rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.5px;">Adresse email</label>
            <div class="input-group">
                <span class="input-group-text" style="border:1.5px solid #E2E8F0;border-right:none;background:#FAFAFA;"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control {% if form.email.errors %}is-invalid{% endif %}" placeholder="votre@email.com" required style="border-left:none;">
            </div>
            {% if form.email.errors %}<div class="text-danger mt-1" style="font-size:.8rem;">{{ form.email.errors.0 }}</div>{% endif %}
        </div>
        <button type="submit" class="btn-send">
            <i class="bi bi-send-fill me-2"></i>Envoyer le lien
        </button>
    </form>

    <div class="text-center mt-3" style="font-size:.875rem;color:#64748B;">
        <a href="{% url 'accounts:login' %}" style="color:#4F46E5;font-weight:600;text-decoration:none;"><i class="bi bi-arrow-left me-1"></i>Retour à la connexion</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
