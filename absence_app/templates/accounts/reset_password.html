<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe | GestiAbsence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #fff; border-radius: 20px; box-shadow: 0 4px 40px rgba(0,0,0,.08); padding: 48px; max-width: 440px; width: 100%; }
        .form-control { border: 1.5px solid #E2E8F0; border-radius: 10px; padding: 10px 14px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-control:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
        .btn-reset { background: linear-gradient(135deg, #4F46E5, #6366F1); color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 700; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; }
        .form-label { font-size:.8rem; font-weight:600; color:#475569; text-transform:uppercase; letter-spacing:.5px; }
    </style>
</head>
<body>
<div class="box">
    <div class="text-center mb-4">
        <div style="width:56px;height:56px;background:#DCFCE7;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.5rem;color:#10B981;">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h4 style="font-weight:800;color:#0F172A;">Nouveau mot de passe</h4>
        <p style="color:#64748B;font-size:.875rem;">Choisissez un nouveau mot de passe sécurisé.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Nouveau mot de passe</label>
            <input type="password" name="password1" class="form-control" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirmer le mot de passe</label>
            <input type="password" name="password2" class="form-control" required>
            {% if form.non_field_errors %}<div class="text-danger mt-1" style="font-size:.8rem;">{{ form.non_field_errors.0 }}</div>{% endif %}
        </div>
        <button type="submit" class="btn-reset">
            <i class="bi bi-check2-circle me-2"></i>Réinitialiser
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
